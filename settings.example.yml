    categories: [it, news]
    enabled: false
    weight: 0.9

  - name: techmeme
    type: rss
    url_template: "https://www.techmeme.com/feed.xml"
    categories: [it, news]
    enabled: false
    weight: 0.9

  - name: theverge
    type: rss
    url_template: "https://www.theverge.com/rss/index.xml"
    categories: [it, news]
    enabled: false
    weight: 0.8

  - name: wired_rss
    type: rss
    url_template: "https://www.wired.com/feed/rss"
    categories: [it, news]
    enabled: false
    weight: 0.8

  # --- Developer & Code (15+) ---
  - name: devto
    type: json
    url_template: "https://dev.to/api/articles?tag={query}&per_page=25"
    categories: [it]
    enabled: false
    weight: 0.8
    result_path: ""
    url_field: "url"
    title_field: "title"
    content_field: "description"

  - name: hashnode
    type: rss
    url_template: "https://hashnode.com/n/{query}/rss"
    categories: [it]
    enabled: false
    weight: 0.7

  - name: lobsters
    type: rss
    url_template: "https://lobste.rs/search.rss?q={query}&what=stories"
    categories: [it]
    enabled: false
    weight: 0.8

  - name: reddit_programming
    type: rss
    url_template: "https://www.reddit.com/r/programming/search.rss?q={query}&restrict_sr=1&sort=relevance"
    categories: [it]
    enabled: false
    weight: 0.7

  # --- Academic & Research (10+) ---
  - name: pubmed
    type: json
    url_template: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term={query}&retmax=25&retmode=json"
    categories: [science]
    enabled: false
    weight: 0.9
    result_path: "esearchresult.idlist"

  - name: doaj
    type: json
    url_template: "https://doaj.org/api/search/articles/{query}?pageSize=25"
    categories: [science]
    enabled: false
    weight: 0.8
    result_path: "results"
    url_field: "bibjson.link[0].url"
    title_field: "bibjson.title"
    content_field: "bibjson.abstract"

  - name: core_ac_uk
    type: json
    url_template: "https://api.core.ac.uk/v3/search/works?q={query}&limit=25"
    categories: [science]
    enabled: false
    weight: 0.8
    result_path: "results"
    url_field: "downloadUrl"
    title_field: "title"
    content_field: "abstract"

  - name: semantic_scholar
    type: json
    url_template: "https://api.semanticscholar.org/graph/v1/paper/search?query={query}&limit=25&fields=title,url,abstract"
    categories: [science]
    enabled: false
    weight: 0.9
    result_path: "data"
    url_field: "url"
    title_field: "title"
    content_field: "abstract"

  # --- Images (5+) ---
  - name: unsplash
    type: json
    url_template: "https://unsplash.com/napi/search/photos?query={query}&per_page=25"
    categories: [images]
    enabled: false
    weight: 0.8
    result_path: "results"
    url_field: "links.html"
    title_field: "alt_description"
    thumbnail_field: "urls.small"

  - name: flickr
    type: json
    url_template: "https://www.flickr.com/services/rest/?method=flickr.photos.search&text={query}&format=json&nojsoncallback=1&per_page=25"
    categories: [images]
    enabled: false
    weight: 0.7
    result_path: "photos.photo"

  - name: pixabay
    type: json
    url_template: "https://pixabay.com/api/?key={api_key}&q={query}&per_page=25"
    categories: [images]
    enabled: false
    weight: 0.8
    result_path: "hits"
    url_field: "pageURL"
    title_field: "tags"
    thumbnail_field: "previewURL"

  - name: giphy
    type: json
    url_template: "https://api.giphy.com/v1/gifs/search?api_key={api_key}&q={query}&limit=25"
    categories: [images]
    enabled: false
    weight: 0.6
    result_path: "data"
    url_field: "url"
    title_field: "title"
    thumbnail_field: "images.fixed_height_small.url"

  # --- Videos (5+) ---
  - name: peertube
    type: json
    url_template: "https://sepiasearch.org/api/v1/search/videos?search={query}&count=25"
    categories: [videos]
    enabled: false
    weight: 0.7
    result_path: "data"
    url_field: "url"
    title_field: "name"
    content_field: "description"
    thumbnail_field: "thumbnailPath"

  - name: odysee
    type: json
    url_template: "https://odysee.com/$/api/lighthouse/search?s={query}&size=25"
    categories: [videos]
    enabled: false
    weight: 0.7
    result_path: ""
    url_field: "canonical_url"
    title_field: "name"
    content_field: "description"

  # --- Music (5+) ---
  - name: bandcamp
    type: opensearch
    url_template: "https://bandcamp.com/search?q={query}"
    categories: [music]
    enabled: false
    weight: 0.7

  - name: soundcloud
    type: opensearch
    url_template: "https://soundcloud.com/search?q={query}"
    categories: [music]
    enabled: false
    weight: 0.7

  - name: musicbrainz
    type: json
    url_template: "https://musicbrainz.org/ws/2/release?query={query}&fmt=json&limit=25"
    categories: [music]
    enabled: false
    weight: 0.8
    result_path: "releases"
    url_field: "id"
    title_field: "title"
    content_field: "artist-credit[0].name"

  # --- Finance (5+) ---
  - name: sec_edgar
    type: rss
    url_template: "https://www.sec.gov/cgi-bin/srch-ia?text={query}&format=rss"
    categories: [finance]
    enabled: false
    weight: 0.8

  - name: yahoo_finance
    type: json
    url_template: "https://query1.finance.yahoo.com/v1/finance/search?q={query}&quotesCount=25"
    categories: [finance]
    enabled: false
    weight: 0.8
    result_path: "quotes"
    url_field: "symbol"
    title_field: "shortname"
    content_field: "longname"

  # --- Security (3+) ---
  - name: nvd_cve
    type: json
    url_template: "https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch={query}&resultsPerPage=25"
    categories: [it]
    enabled: false
    weight: 0.9
    result_path: "vulnerabilities"
    url_field: "cve.id"
    title_field: "cve.id"
    content_field: "cve.descriptions[0].value"

  - name: exploit_db
    type: rss
    url_template: "https://www.exploit-db.com/rss.xml?q={query}"
    categories: [it]
    enabled: false
    weight: 0.8
