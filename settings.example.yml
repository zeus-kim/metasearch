# ============================================================================
# Metasearch Configuration
# Copy this file to settings.yml and customize as needed
# ============================================================================

# Run mode: "full" (default) or "proxy".
# Proxy mode serves external-engine search only — no feed polling, no
# embeddings, and nothing written to disk. Also settable via METASEARCH_MODE.
mode: full

# Search behavior
search:
  default_lang: auto              # auto-detect from browser or query
  safe_search: 0                  # 0=off, 1=moderate, 2=strict
  autocomplete: duckduckgo        # autocomplete provider
  news:
    discover_cache_ttl_hours: 2   # how long to cache Discover feed
    discover_articles_per_category: 30

# Server settings
server:
  bind_address: 127.0.0.1         # use 0.0.0.0 for network access
  port: 8889
  image_proxy: true               # proxy images for privacy
  cache_ttl_secs: 300             # search result cache
  request_timeout_secs: 9
  rate_limit:
    enabled: true
    search_requests_per_minute: 60

# AI features (optional - requires Ollama or OpenAI API key)
ai:
  enabled: false                  # set true after configuring
  base_url: http://127.0.0.1:11434  # Ollama default
  model: llama3.2:3b              # local model
  # For OpenAI: set OPENAI_API_KEY env var and use:
  # base_url: https://api.openai.com/v1
  # model: gpt-4o-mini

# Branding
branding:
  app_name: Metasearch            # shown in UI

# News feeds (local indexing)
feeds:
  enabled: true                   # enable RSS feed polling
  poll_interval_mins: 30          # how often to check feeds
  retention_days: 7               # delete indexed articles older than this
  max_disk_mb: 0                  # hard cap on the article index in MiB (0 = unlimited)
  embeddings: false               # embed indexed articles via local Ollama (heavy; opt-in)

# ============================================================================
# Search Engines
# Core engines enabled by default for best first-run experience
# ============================================================================
engines:
  # --- Core Search (enabled by default) ---
