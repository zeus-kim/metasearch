# ============================================================================
# Custom Search Engines (JSON/RSS APIs) - 100+ engines
# ============================================================================
custom_engines:
  # --- Social & Community (15) ---
  - name: reddit_search
    type: json
    url_template: "https://www.reddit.com/search.json?q={query}&limit=25"
    categories: [social]
    enabled: false
    weight: 0.9
    result_path: "data.children"
    url_field: "data.url"
    title_field: "data.title"
    content_field: "data.selftext"

  - name: hn_algolia
    type: json
    url_template: "https://hn.algolia.com/api/v1/search?query={query}&tags=story"
    categories: [tech, social]
    enabled: true
    weight: 1.0
    result_path: "hits"
    url_field: "url"
    title_field: "title"

  - name: lobsters_search
    type: rss
    url_template: "https://lobste.rs/search?q={query}&what=stories&order=relevance&format=rss"
    categories: [tech]
    enabled: false
    weight: 0.9

  - name: devto_search
    type: json
    url_template: "https://dev.to/api/articles?tag={query}&per_page=25"
    categories: [tech]
    enabled: false
    weight: 0.8
    result_path: ""
    url_field: "url"
    title_field: "title"
    content_field: "description"

  - name: hashnode
    type: json
    url_template: "https://hashnode.com/api/search?q={query}"
    categories: [tech]
    enabled: false
    weight: 0.7
    result_path: "posts"
    url_field: "url"
    title_field: "title"
    content_field: "brief"

  - name: medium_tags
    type: rss
    url_template: "https://medium.com/feed/tag/{query}"
    categories: [general]
    enabled: false
    weight: 0.7

  - name: indiehackers
    type: rss
    url_template: "https://www.indiehackers.com/feed.xml?q={query}"
    categories: [tech]
    enabled: false
    weight: 0.7

  # slashdot: RSS feed without search (disabled - no {query} support)
