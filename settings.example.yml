    categories: [news]
    enabled: false
    weight: 0.9

  - name: bbc_rss
    type: rss
    url_template: "https://feeds.bbci.co.uk/news/rss.xml"
    categories: [news]
    enabled: false
    weight: 0.9

  - name: npr_rss
    type: rss
    url_template: "https://feeds.npr.org/1001/rss.xml"
    categories: [news]
    enabled: false
    weight: 0.8

  - name: guardian_rss
    type: rss
    url_template: "https://www.theguardian.com/world/rss"
    categories: [news]
    enabled: false
    weight: 0.9

  - name: ars_technica
    type: rss
