# Orgos Search Engine - Docker Compose
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d --build      # Rebuild and start
#   docker compose logs -f orgos      # Follow logs
#   docker compose down               # Stop all services
#
# With Redis cache (optional):
#   docker compose --profile cache up -d

services:
  orgos:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Enable Redis feature when using cache profile
        FEATURES: "${ORGOS_FEATURES:-}"
    image: orgos:latest
    container_name: orgos
    restart: unless-stopped
    ports:
      - "${ORGOS_PORT:-8889}:8889"
    environment:
      # Server configuration
      METASEARCH_SETTINGS: /app/settings.yml
      METASEARCH_BIND: "0.0.0.0"
      METASEARCH_PORT: "8889"
      METASEARCH_LOG: "${ORGOS_LOG_LEVEL:-info}"
      # AI backend (Ollama on host)
      METASEARCH_AI_BASE_URL: "${ORGOS_AI_BASE_URL:-http://host.docker.internal:11434}"
      # Redis cache (when using cache profile)
      METASEARCH_REDIS_URL: "${ORGOS_REDIS_URL:-}"
    extra_hosts:
      # Allow container to reach host services (Ollama, etc.)
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount settings file (read-only)
      - ./settings.yml:/app/settings.yml:ro
      # Persistent cache directory
      - orgos-cache:/app/.metasearch-cache
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8889/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M
    depends_on:
      redis:
        condition: service_healthy
        required: false

  # Optional Redis for distributed caching
  redis:
    image: redis:7-alpine
    container_name: orgos-redis
    profiles:
      - cache
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M

volumes:
  orgos-cache:
    name: orgos-cache
  redis-data:
    name: orgos-redis-data
